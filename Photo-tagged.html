<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo City Tagger — dom-wc26</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#0f1117;color:#eee;min-height:100vh;padding:20px}
  h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
  .sub{font-size:13px;color:#888;margin-bottom:20px}
  .status{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none}
  .status.info{background:#1a2a3a;color:#7ab8ff;display:block}
  .status.ok{background:#1a2e1a;color:#6fdd6f;display:block}
  .status.err{background:#2e1a1a;color:#ff7070;display:block}
  .section-head{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#666;margin:20px 0 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .card{background:#1a1d24;border:1.5px solid #2a2d35;border-radius:10px;overflow:hidden;transition:border-color .15s}
  .card.tagged{border-color:#2a4a2a}
  .card.saving{opacity:.6;pointer-events:none}
  .card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#111}
  .card-body{padding:8px}
  .card-meta{font-size:11px;color:#888;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-caption{font-size:11px;color:#bbb;margin-bottom:6px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  select{width:100%;font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid #3a3d45;background:#0f1117;color:#eee;cursor:pointer}
  select.assigned{border-color:#3a6a3a;color:#6fdd6f}
  .save-btn{margin-top:6px;width:100%;font-size:11px;font-weight:600;padding:5px 0;border-radius:6px;border:none;background:#012169;color:#fff;cursor:pointer}
  .save-btn:hover{background:#1a3a7a}
  .save-btn.done{background:#1a4a1a;color:#6fdd6f;pointer-events:none}
  .empty{color:#555;font-size:13px;padding:20px 0}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:#012169;color:#fff;margin-left:6px;vertical-align:middle}
  .badge.green{background:#1a4a1a;color:#6fdd6f}
  .bulk{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .bulk select{width:auto;min-width:150px}
  .bulk button{font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;border:none;background:#012169;color:#fff;cursor:pointer}
  .bulk button:hover{background:#1a3a7a}
  .summary{font-size:12px;color:#888;margin-bottom:8px}
</style>
</head>
<body>

<h1>📷 Photo City Tagger</h1>
<p class="sub">Assign missing city tags to existing gallery photos. Changes save directly to Firebase.</p>

<div class="status info" id="status">Connecting to Firebase…</div>

<div id="app" style="display:none">
  <div class="summary" id="summary"></div>

  <div id="untagged-section">
    <div class="section-head">Untagged photos <span class="badge" id="untagged-count">0</span></div>
    <div class="bulk">
      <select id="bulk-city">
        <option value="">— bulk assign city —</option>
        <option>Boston</option>
        <option>New York City</option>
        <option>Atlanta</option>
        <option>Toronto</option>
        <option>Mexico City</option>
        <option>Dallas</option>
        <option>Miami</option>
      </select>
      <button onclick="bulkAssign()">Apply to all untagged</button>
    </div>
    <div class="grid" id="untagged-grid"><div class="empty">Loading…</div></div>
  </div>

  <div id="tagged-section" style="margin-top:28px">
    <div class="section-head">Tagged photos <span class="badge green" id="tagged-count">0</span></div>
    <div class="grid" id="tagged-grid"><div class="empty">None yet</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyAN2EWI4p56QvPEebQeooLu6GKk3VlY4pI',
  authDomain:        'world-cup-ed57c.firebaseapp.com',
  databaseURL:       'https://world-cup-ed57c-default-rtdb.firebaseio.com',
  projectId:         'world-cup-ed57c',
  storageBucket:     'world-cup-ed57c.firebasestorage.app',
  messagingSenderId: '214737168435',
  appId:             '1:214737168435:web:5249a22cbf65da0e2bdb46',
};

const CITIES = ['Boston','New York City','Atlanta','Toronto','Mexico City','Dallas','Miami'];

const app = firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.database(app);

const statusEl       = document.getElementById('status');
const appEl          = document.getElementById('app');
const untaggedGrid   = document.getElementById('untagged-grid');
const taggedGrid     = document.getElementById('tagged-grid');
const untaggedCount  = document.getElementById('untagged-count');
const taggedCount    = document.getElementById('tagged-count');
const summaryEl      = document.getElementById('summary');

let allPhotos = {}; // key -> record

function setStatus(msg, type='info'){
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
}

function citySelect(id, currentCity){
  return `<select id="sel-${id}" onchange="selChanged('${id}')" ${currentCity?'class="assigned"':''}>
    <option value="">No city</option>
    ${CITIES.map(c=>`<option value="${c}" ${c===currentCity?'selected':''}>${c}</option>`).join('')}
  </select>`;
}

function buildCard(id, p){
  const city = p.city || '';
  const ts   = p.ts ? new Date(p.ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  return `<div class="card ${city?'tagged':''}" id="card-${id}">
    <img src="${p.url}" loading="lazy" alt="">
    <div class="card-body">
      <div class="card-meta">${p.name||'?'} · ${ts}</div>
      ${p.caption?`<div class="card-caption">"${p.caption}"</div>`:''}
      ${citySelect(id, city)}
      <button class="save-btn ${city?'done':''}" id="btn-${id}" onclick="saveCity('${id}')">${city?'✓ Saved':'Save'}</button>
    </div>
  </div>`;
}

function selChanged(id){
  const sel = document.getElementById('sel-'+id);
  const btn = document.getElementById('btn-'+id);
  sel.className = sel.value ? 'assigned' : '';
  btn.className = 'save-btn';
  btn.textContent = 'Save';
}

async function saveCity(id){
  const sel = document.getElementById('sel-'+id);
  const btn = document.getElementById('btn-'+id);
  const city = sel.value;
  const card = document.getElementById('card-'+id);
  card.classList.add('saving');
  try {
    await db.ref(`gallery/photos/${id}/city`).set(city || null);
    allPhotos[id].city = city;
    btn.className = 'save-btn done';
    btn.textContent = '✓ Saved';
    card.classList.remove('saving');
    card.classList.toggle('tagged', !!city);
    recount();
    // Move card to the right section
    if(city){
      card.remove();
      taggedGrid.querySelector('.empty') && (taggedGrid.innerHTML='');
      taggedGrid.insertAdjacentHTML('beforeend', buildCard(id, allPhotos[id]));
    }
  } catch(e){
    setStatus('Save failed: '+e.message, 'err');
    card.classList.remove('saving');
  }
}

function recount(){
  const untagged = Object.values(allPhotos).filter(p=>!p.city).length;
  const tagged   = Object.values(allPhotos).filter(p=>!!p.city).length;
  untaggedCount.textContent = untagged;
  taggedCount.textContent   = tagged;
  summaryEl.textContent     = `${Object.keys(allPhotos).length} total photos · ${untagged} need a city tag`;
}

async function bulkAssign(){
  const city = document.getElementById('bulk-city').value;
  if(!city){ alert('Pick a city first'); return; }
  const untaggedIds = Object.entries(allPhotos).filter(([,p])=>!p.city).map(([k])=>k);
  if(!untaggedIds.length){ alert('No untagged photos'); return; }
  if(!confirm(`Tag all ${untaggedIds.length} untagged photos as "${city}"?`)) return;
  setStatus(`Saving ${untaggedIds.length} photos…`, 'info');
  for(const id of untaggedIds){
    await db.ref(`gallery/photos/${id}/city`).set(city);
    allPhotos[id].city = city;
  }
  render();
  setStatus(`Done — tagged ${untaggedIds.length} photos as ${city}`, 'ok');
}

function render(){
  const untagged = Object.entries(allPhotos).filter(([,p])=>!p.city).sort((a,b)=>b[1].ts-a[1].ts);
  const tagged   = Object.entries(allPhotos).filter(([,p])=>!!p.city).sort((a,b)=>b[1].ts-a[1].ts);

  untaggedGrid.innerHTML = untagged.length
    ? untagged.map(([id,p])=>buildCard(id,p)).join('')
    : '<div class="empty">All photos have a city tag 🎉</div>';

  taggedGrid.innerHTML = tagged.length
    ? tagged.map(([id,p])=>buildCard(id,p)).join('')
    : '<div class="empty">None yet</div>';

  recount();
}

// Load
db.ref('gallery/photos').once('value')
  .then(snap => {
    const data = snap.val() || {};
    allPhotos = data;
    appEl.style.display = 'block';
    setStatus(`Loaded ${Object.keys(data).length} photos`, 'ok');
    render();
  })
  .catch(e => setStatus('Failed to load: '+e.message, 'err'));
</script>
</body>
</html>
